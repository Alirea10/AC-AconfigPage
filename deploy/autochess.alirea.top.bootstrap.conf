server {
    listen 80;
    listen [::]:80;
    server_name autochess.alirea.top;

    root /www/wwwroot/autochess.alirea.top/current;
    index index.html;

    access_log /www/wwwlogs/autochess.alirea.top.log;
    error_log /www/wwwlogs/autochess.alirea.top.error.log;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
