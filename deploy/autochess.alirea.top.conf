server {
    listen 80;
    listen [::]:80;
    server_name autochess.alirea.top;

    root /www/wwwroot/autochess.alirea.top/current;

    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name autochess.alirea.top;

    root /www/wwwroot/autochess.alirea.top/current;
    index index.html;
    client_max_body_size 4m;

    ssl_certificate /etc/letsencrypt/live/autochess.alirea.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autochess.alirea.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /www/wwwlogs/autochess.alirea.top.log;
    error_log /www/wwwlogs/autochess.alirea.top.error.log;

    location /api/ {
        proxy_pass http://124.71.104.129:7999/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
