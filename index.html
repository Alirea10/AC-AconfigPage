<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/webp" href="/orange/4.webp" />

      (() => {
        const assets = ['4', '6', '7', '10', '15', '18', '19', '20', '25', '28', '33', '36'];

      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>autochess-config-page</title>
